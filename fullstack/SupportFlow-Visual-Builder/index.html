<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="SupportFlow Visual Builder — Design and test automated customer support chatbot flows with an interactive visual decision tree editor." />
  <meta property="og:title" content="SupportFlow Visual Builder" />
  <meta property="og:description" content="Visual decision tree editor for customer support automation." />
  <title>SupportFlow Visual Builder</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/styles/reset.css" />
  <link rel="stylesheet" href="./src/styles/tokens.css" />
  <link rel="stylesheet" href="./src/styles/animations.css" />
  <link rel="stylesheet" href="./src/styles/app.css" />
  <link rel="stylesheet" href="./src/styles/toolbar.css" />
  <link rel="stylesheet" href="./src/styles/canvas.css" />
  <link rel="stylesheet" href="./src/styles/nodes.css" />
  <link rel="stylesheet" href="./src/styles/editor.css" />
  <link rel="stylesheet" href="./src/styles/preview.css" />
</head>

<body>
  <div id="app">
    <!-- Toolbar -->
    <header id="toolbar"></header>

    <!-- Main stage -->
    <main id="stage">
      <!-- Canvas (editor view) -->
      <div id="canvas-wrapper">
        <div id="canvas">
          <!-- SVG connector layer (rendered by svgLayer.js) -->
          <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="var(--clr-connector)" />
              </marker>
              <marker id="arrowhead-active" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="var(--clr-accent-primary)" />
              </marker>
            </defs>
          </svg>
          <!-- Node cards layer (rendered by canvas.js) -->
          <div id="nodes-layer"></div>
        </div>
      </div>

      <!-- Edit panel (slide-in from right) -->
      <aside id="edit-panel" class="edit-panel" aria-label="Node editor"></aside>

      <!-- Preview / chat mode overlay -->
      <div id="preview-overlay" class="preview-overlay hidden" aria-label="Bot preview"></div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
